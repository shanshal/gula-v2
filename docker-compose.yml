version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: gula-survey-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-shanshal}
      POSTGRES_PASSWORD: ${PGPASSWORD:-SecureP@ssword}
      POSTGRES_DB: ${PGDATABASE:-gula_v2_app}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-shanshal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gula-survey-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PGUSER: ${PGUSER:-shanshal}
      PGHOST: db
      PGDATABASE: ${PGDATABASE:-gula_v2_app}
      PGPASSWORD: ${PGPASSWORD:-SecureP@ssword}
      PGPORT: 5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
